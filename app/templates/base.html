<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Barber Dashboard{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script>window.getLang = () => localStorage.getItem('lang') || 'en';</script>
  <style>
    body {
      background-color: #f0f2f5;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Navbar */
    .navbar {
      border-bottom: 3px solid #111;
    }
    .navbar-brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .nav-today {
      font-size: 0.85rem;
      color: #adb5bd;
      text-decoration: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 3px 10px;
      transition: all 0.15s;
    }
    .nav-today:hover {
      background: #333;
      color: #fff;
    }

    /* Stat cards */
    .stat-card {
      border: none;
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      opacity: 0.65;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
    }

    /* Table */
    .appt-table th {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      color: #6c757d;
      border-bottom: 2px solid #dee2e6;
      padding-top: 0.85rem;
      padding-bottom: 0.85rem;
    }
    .appt-table td {
      vertical-align: middle;
      padding: 0.75rem 1rem;
    }
    .appt-table tbody tr {
      border-left: 4px solid transparent;
      transition: background 0.1s;
    }
    .appt-table tbody tr.row-confirmed {
      border-left-color: #198754;
    }
    .appt-table tbody tr.row-confirmed:hover {
      background-color: #f0faf4;
    }
    .appt-table tbody tr.row-cancelled {
      border-left-color: #dee2e6;
      color: #adb5bd;
    }
    .appt-table tbody tr.row-blocked {
      border-left-color: #fd7e14;
      background-color: #fff8f0;
    }
    .time-cell {
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .customer-name {
      font-weight: 600;
    }
    .customer-notes {
      font-size: 0.78rem;
      color: #6c757d;
      margin-top: 2px;
    }
    .phone-link {
      color: inherit;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .phone-link:hover {
      text-decoration: underline;
    }
    .badge-confirmed {
      background-color: #d1e7dd;
      color: #0a3622;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 20px;
    }
    .badge-cancelled {
      background-color: #e9ecef;
      color: #6c757d;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 20px;
    }
    .badge-blocked {
      background-color: #ffe8cc;
      color: #7d3600;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 20px;
    }

    /* Date navigation */
    .date-nav-btn {
      border: 1px solid #dee2e6;
      background: #fff;
      color: #495057;
      border-radius: 6px;
      padding: 6px 14px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.15s;
    }
    .date-nav-btn:hover {
      background: #212529;
      color: #fff;
      border-color: #212529;
    }
    .date-heading {
      font-size: 1.3rem;
      font-weight: 700;
    }

    /* Empty state */
    .empty-state {
      padding: 4rem 1rem;
      text-align: center;
      color: #adb5bd;
    }
    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 0.75rem;
    }

    /* Language toggle */
    .lang-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1.4;
      color: #fff;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4 px-3">
    <div class="container d-flex justify-content-between align-items-center">
      <span class="navbar-brand mb-0" data-i18n="nav-brand">✂ Barber Dashboard</span>
      <div class="d-flex align-items-center gap-2">
        <a href="/dashboard/" class="nav-today" data-i18n="nav-today">Today</a>
        <button class="lang-btn" id="lang-toggle" onclick="toggleLang()">🇨🇷</button>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>


<script>
  const I18N = {
    es: {
      'nav-brand':            '✂ Panel del Barbero',
      'nav-today':            'Hoy',
      'stat-confirmed':       'Confirmados',
      'stat-cancelled':       'Cancelados',
      'stat-blocked':         'Bloqueados',
      'block-slot-label':     'Bloquear un turno',
      'block-btn':            'Bloquear',
      'th-time':              'Hora',
      'th-customer':          'Cliente',
      'th-phone':             'Teléfono',
      'th-status':            'Estado',
      'badge-confirmed':      'Confirmado',
      'badge-cancelled':      'Cancelado',
      'badge-blocked':        'Bloqueado',
      'cancel-btn':           'Cancelar',
      'unblock-btn':          'Desbloquear',
      'empty-title':          'No hay citas ni bloqueos para este día.',
      'empty-sub':            'Usa las flechas o el selector de fecha para navegar a otro día.',
      'error-already-booked': 'Ese horario ya tiene una cita confirmada y no puede bloquearse.',
      'error-invalid':        'Hora no válida. Selecciona una hora válida de la lista.',
    }
  };

  function applyLang(lang) {
    const map = lang === 'es' ? I18N.es : {};
    document.querySelectorAll('[data-i18n]').forEach(el => {
      el.textContent = (lang === 'es' ? map[el.dataset.i18n] : el.dataset.i18nEn) ?? el.textContent;
    });
    document.getElementById('lang-toggle').textContent = lang === 'es' ? '🇺🇸' : '🇨🇷';
    document.documentElement.lang = lang;
  }

  function toggleLang() {
    const next = (localStorage.getItem('lang') || 'en') === 'en' ? 'es' : 'en';
    localStorage.setItem('lang', next);
    applyLang(next);
  }

  document.querySelectorAll('[data-i18n]').forEach(el => { el.dataset.i18nEn = el.textContent.trim(); });
  applyLang(localStorage.getItem('lang') || 'en');
</script>
</body>
</html>
