<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Barber Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #121416;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .login-card {
      background: #1e2125;
      border: 1px solid #2d3035;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .login-brand {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      text-align: center;
      margin-bottom: 2rem;
    }
    .form-label {
      color: #adb5bd;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .form-control {
      background: #2d3035;
      border-color: #3d4045;
      color: #fff;
    }
    .form-control:focus {
      background: #2d3035;
      border-color: #6c757d;
      color: #fff;
      box-shadow: 0 0 0 0.2rem rgba(108, 117, 125, 0.25);
    }
    .form-control::placeholder { color: #6c757d; }
    .btn-login {
      background: #fff;
      color: #111;
      font-weight: 700;
      border: none;
      width: 100%;
      padding: 0.6rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-login:hover { background: #e9ecef; }
  </style>
</head>
<body>

  <div class="login-card">

    <div class="login-brand">✂ Barber Dashboard</div>

    {% if error == "invalid_credentials" %}
    <div class="alert alert-danger py-2 mb-3" style="font-size:0.875rem;" role="alert" data-i18n="error-login">
      Invalid email or password.
    </div>
    {% endif %}

    <form method="post" action="/auth/login">
      <div class="mb-3">
        <label for="email" class="form-label" data-i18n="label-email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          autocomplete="email"
          required
        />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label" data-i18n="label-password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit" class="btn-login" data-i18n="btn-login">Sign in</button>
    </form>

  </div>

<script>
  const I18N_ES = {
    'error-login':    'Correo o contraseña incorrectos.',
    'label-email':    'Correo electrónico',
    'label-password': 'Contraseña',
    'btn-login':      'Iniciar sesión',
  };

  function applyLang(lang) {
    const map = lang === 'es' ? I18N_ES : {};
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const en = el.dataset.i18nEn ?? el.textContent.trim();
      el.dataset.i18nEn = en;
      el.textContent = lang === 'es' ? (map[el.dataset.i18n] ?? en) : en;
    });
    document.documentElement.lang = lang;
  }

  document.querySelectorAll('[data-i18n]').forEach(el => { el.dataset.i18nEn = el.textContent.trim(); });
  applyLang(localStorage.getItem('lang') || 'en');
</script>

</body>
</html>
