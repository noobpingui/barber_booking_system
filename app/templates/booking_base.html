<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Book an Appointment{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f0f2f5;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .navbar {
      border-bottom: 3px solid #111;
    }
    .navbar-brand {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* Slot grid */
    .slot-btn {
      width: 90px;
      border: 2px solid #dee2e6;
      background: #fff;
      border-radius: 8px;
      padding: 10px 0;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #212529;
    }
    .slot-btn:hover {
      border-color: #212529;
      background: #212529;
      color: #fff;
    }
    .slot-btn.selected {
      border-color: #0d6efd;
      background: #0d6efd;
      color: #fff;
    }
    .slot-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Section cards */
    .section-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      margin-bottom: 1.25rem;
    }
    .section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      color: #6c757d;
      margin-bottom: 1rem;
    }

    /* Confirmation */
    .confirm-icon {
      font-size: 3.5rem;
    }
    .confirm-detail {
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4 px-3">
    <div class="container">
      <span class="navbar-brand mb-0">✂ Book an Appointment</span>
    </div>
  </nav>

  <div class="container pb-5" style="max-width: 640px;">
    {% block content %}{% endblock %}
  </div>

</body>
</html>
