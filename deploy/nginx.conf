# Nginx site configuration for the Barber Booking System.
#
# Installation:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/barber
#   sudo ln -s /etc/nginx/sites-available/barber /etc/nginx/sites-enabled/barber
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# After this, run Certbot to add HTTPS automatically:
#   sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com;  # ← replace with your domain or EC2 public IP

    # Forward all requests to Gunicorn.
    location / {
        proxy_pass http://127.0.0.1:8000;

        # Pass real client info to the app.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent Nginx from closing the connection before Gunicorn responds.
        proxy_read_timeout 30s;
    }

    # Optional: let Nginx serve a custom 502 page if the app is down.
    error_page 502 /502.html;
    location = /502.html {
        root /var/www/html;
        internal;
    }
}

# Note: Certbot will automatically add a second server block here
# for HTTPS (port 443) when you run: sudo certbot --nginx -d yourdomain.com
